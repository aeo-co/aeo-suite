<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trend Report — AEO Suite</title>

    <link rel="stylesheet" href="shared/tokens.css" />

    <style>
      /* ============================================================
     Trend Report — v1 visibility trend over time
     ============================================================
     Page-specific styles. Shared tokens come from tokens.css.
     v1 scope: upload 2+ scan CSVs, see visibility over time +
     biggest query movers. Nothing else — keeping it tight.
     ============================================================ */

      /* ---------- Multi-CSV upload zone ---------- */
      .multi-upload {
        display: block; /* Labels default to inline, which makes the dashed
                           border render as disjoint rectangles around each
                           child line-box. Block fixes the border into a
                           single continuous shape. */
        padding: 32px 28px;
        background: var(--bg-1);
        border: 1px dashed var(--line-strong);
        border-radius: var(--radius);
        margin-bottom: 24px;
        position: relative;
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .multi-upload:hover,
      .multi-upload.is-dragover {
        border-color: var(--accent);
        background: var(--bg-2);
      }
      .multi-upload input[type="file"] {
        /* display:none rather than opacity:0 + inset. Some browsers still
       allocate intrinsic width for the native "Choose File" button even
       when opacity is 0, which leaks visible chrome (dashed-border tabs)
       through the left edge of the drop zone. Hiding it completely
       removes all layout influence, and we trigger the picker
       programmatically via the upload zone's click handler. */
        display: none;
      }
      .multi-upload .mu-icon {
        width: 40px;
        height: 40px;
        margin: 0 auto 12px;
        border-radius: 10px;
        background: var(--bg-3);
        border: 1px solid var(--line-strong);
        display: grid;
        place-items: center;
        color: var(--accent);
      }
      .multi-upload .mu-icon svg {
        width: 20px;
        height: 20px;
      }
      .multi-upload .mu-title {
        text-align: center;
        font-family: var(--serif);
        font-style: italic;
        font-size: 22px;
        color: var(--ink);
        margin-bottom: 4px;
      }
      .multi-upload .mu-sub {
        text-align: center;
        font-size: 13px;
        color: var(--ink-mute);
        line-height: 1.5;
      }
      .multi-upload .mu-hint {
        text-align: center;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink-faint);
        letter-spacing: 0.08em;
        margin-top: 10px;
      }

      /* ---------- Loaded files panel ---------- */
      .loaded-panel {
        padding: 20px 24px;
        background: var(--bg-1);
        border: 1px solid var(--accent-line);
        border-radius: var(--radius);
        margin-bottom: 24px;
      }
      .loaded-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
        flex-wrap: wrap;
      }
      .loaded-title {
        font-family: var(--serif);
        font-style: italic;
        font-size: 18px;
        color: var(--ink);
      }
      .loaded-actions {
        display: flex;
        gap: 8px;
      }
      .loaded-actions button {
        padding: 6px 12px;
        background: var(--bg-2);
        border: 1px solid var(--line-strong);
        border-radius: var(--radius-sm);
        color: var(--ink-mute);
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.15s;
      }
      .loaded-actions button:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .loaded-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .loaded-row {
        display: grid;
        grid-template-columns: 28px 1fr auto auto auto;
        gap: 12px;
        align-items: center;
        padding: 10px 12px;
        background: var(--bg-0);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        font-size: 13px;
      }
      .loaded-row.bad {
        border-color: rgba(217, 122, 111, 0.4);
        background: linear-gradient(
          135deg,
          rgba(217, 122, 111, 0.06) 0%,
          transparent 100%
        );
      }
      .loaded-row .lr-idx {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink-faint);
      }
      .loaded-row .lr-file {
        font-family: var(--mono);
        color: var(--ink);
        word-break: break-all;
      }
      .loaded-row .lr-meta {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink-mute);
        letter-spacing: 0.04em;
      }
      .loaded-row .lr-meta strong {
        color: var(--ink);
        font-weight: 500;
      }
      .loaded-row .lr-date {
        font-family: var(--serif);
        font-style: italic;
        font-size: 14px;
        color: var(--accent);
        white-space: nowrap;
      }
      .loaded-row .lr-remove {
        background: transparent;
        border: none;
        color: var(--ink-faint);
        cursor: pointer;
        font-family: var(--mono);
        font-size: 16px;
        padding: 2px 8px;
        border-radius: 4px;
        transition:
          color 0.15s,
          background 0.15s;
      }
      .loaded-row .lr-remove:hover {
        color: var(--bad);
        background: rgba(217, 122, 111, 0.08);
      }
      .loaded-warnings {
        margin-top: 12px;
        padding: 10px 14px;
        background: rgba(217, 122, 111, 0.06);
        border: 1px solid rgba(217, 122, 111, 0.3);
        border-radius: var(--radius-sm);
        font-size: 12.5px;
        color: var(--ink);
        line-height: 1.55;
      }
      .loaded-warnings strong {
        color: var(--bad);
      }

      /* ---------- Headline ---------- */
      .tr-headline {
        text-align: center;
        padding: 36px 24px 32px;
        background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        margin-bottom: 24px;
        position: relative;
        overflow: hidden;
      }
      .tr-headline::before {
        content: "";
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 60%;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
      }
      .tr-headline .label {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink-faint);
        letter-spacing: 0.16em;
        text-transform: uppercase;
        margin-bottom: 10px;
      }
      .tr-headline .delta-block {
        display: inline-flex;
        align-items: baseline;
        gap: 18px;
        margin-bottom: 14px;
      }
      .tr-headline .delta-val {
        font-family: var(--serif);
        font-style: italic;
        font-size: clamp(40px, 6vw, 64px);
        line-height: 1;
        letter-spacing: -0.02em;
        color: var(--ink);
      }
      .tr-headline .delta-val.up {
        color: var(--ok);
      }
      .tr-headline .delta-val.down {
        color: var(--bad);
      }
      .tr-headline .delta-val.flat {
        color: var(--ink-mute);
      }
      .tr-headline .delta-arrow {
        font-family: var(--serif);
        font-style: italic;
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1;
        color: var(--ink-faint);
        margin: 0 4px;
        position: relative;
        top: -4px;
      }
      .tr-headline .delta-sub {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--ink-mute);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .tr-headline .span-meta {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink-faint);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      /* ---------- Panels ---------- */
      .panel {
        background: var(--bg-1);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 28px;
        margin-bottom: 20px;
      }
      .panel-label {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink-faint);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin-bottom: 18px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .panel-label::before {
        content: "//";
        color: var(--accent);
      }

      /* ---------- Line chart ---------- */
      .chart-wrap {
        position: relative;
      }
      .chart-svg {
        width: 100%;
        height: 280px;
        display: block;
      }
      .chart-svg .grid line {
        stroke: var(--line);
        stroke-width: 1;
        stroke-dasharray: 2 3;
      }
      .chart-svg .axis text {
        font-family: var(--mono);
        font-size: 10px;
        fill: var(--ink-faint);
        letter-spacing: 0.04em;
      }
      .chart-svg .axis-line {
        stroke: var(--line-strong);
        stroke-width: 1;
      }
      .chart-svg .line {
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .chart-svg .line.you {
        stroke: var(--accent);
        stroke-width: 2.5;
      }
      .chart-svg .line.gpt {
        stroke: #9ec5e8;
      }
      .chart-svg .line.perplexity {
        stroke: #c8a878;
      }
      .chart-svg .line.ai_mode {
        stroke: #b39de0;
      }
      .chart-svg .dot {
        stroke: var(--bg-1);
        stroke-width: 2;
      }
      .chart-svg .dot.you {
        fill: var(--accent);
      }
      .chart-svg .dot.gpt {
        fill: #9ec5e8;
      }
      .chart-svg .dot.perplexity {
        fill: #c8a878;
      }
      .chart-svg .dot.ai_mode {
        fill: #b39de0;
      }

      .chart-legend {
        display: flex;
        gap: 18px;
        flex-wrap: wrap;
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px dashed var(--line);
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink-mute);
        letter-spacing: 0.06em;
      }
      .chart-legend .lg-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .chart-legend .swatch {
        width: 12px;
        height: 2px;
        border-radius: 2px;
      }
      .chart-legend .swatch.you {
        background: var(--accent);
        height: 3px;
      }
      .chart-legend .swatch.gpt {
        background: #9ec5e8;
      }
      .chart-legend .swatch.perplexity {
        background: #c8a878;
      }
      .chart-legend .swatch.ai_mode {
        background: #b39de0;
      }

      /* Tooltip on chart hover */
      .chart-tooltip {
        position: absolute;
        pointer-events: none;
        background: var(--bg-3);
        border: 1px solid var(--line-strong);
        border-radius: var(--radius-sm);
        padding: 8px 10px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        opacity: 0;
        transition: opacity 0.1s;
        z-index: 10;
        white-space: nowrap;
      }
      .chart-tooltip.show {
        opacity: 1;
      }
      .chart-tooltip .tt-date {
        color: var(--accent);
        font-style: italic;
        font-family: var(--serif);
        font-size: 13px;
        margin-bottom: 4px;
      }
      .chart-tooltip .tt-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 2px;
      }
      .chart-tooltip .tt-row .sw {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .chart-tooltip .tt-row strong {
        color: var(--ink);
        margin-left: auto;
      }

      /* ---------- Movers table ---------- */
      .movers-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .mover-row {
        display: grid;
        grid-template-columns: 40px 1fr auto auto;
        gap: 14px;
        align-items: center;
        padding: 12px 14px;
        background: var(--bg-0);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
      }
      .mover-row.up {
        border-left: 3px solid var(--ok);
      }
      .mover-row.down {
        border-left: 3px solid var(--bad);
      }
      .mover-row.flat {
        border-left: 3px solid var(--line-strong);
      }
      .mover-row .m-rank {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink-faint);
        text-align: center;
      }
      .mover-row .m-query {
        font-family: var(--serif);
        font-style: italic;
        font-size: 15px;
        color: var(--ink);
        line-height: 1.3;
        word-break: break-word;
      }
      .mover-row .m-scores {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink-mute);
        text-align: right;
        letter-spacing: 0.04em;
        line-height: 1.4;
      }
      .mover-row .m-scores .from {
        color: var(--ink-faint);
      }
      .mover-row .m-scores .arrow {
        color: var(--ink-faint);
        margin: 0 4px;
      }
      .mover-row .m-delta {
        font-family: var(--serif);
        font-style: italic;
        font-size: 22px;
        line-height: 1;
        text-align: right;
        white-space: nowrap;
      }
      .mover-row.up .m-delta {
        color: var(--ok);
      }
      .mover-row.down .m-delta {
        color: var(--bad);
      }
      .mover-row.flat .m-delta {
        color: var(--ink-mute);
      }

      /* ---------- Empty state ---------- */
      .empty-state {
        padding: 60px 32px;
        text-align: center;
        color: var(--ink-mute);
        background: var(--bg-1);
        border: 1px solid var(--line);
        border-radius: var(--radius);
      }
      .empty-state .ico {
        font-family: var(--serif);
        font-style: italic;
        font-size: 64px;
        color: var(--ink-faint);
        margin-bottom: 12px;
        line-height: 1;
      }
      .empty-state h3 {
        font-family: var(--serif);
        font-style: italic;
        font-weight: 400;
        font-size: 22px;
        color: var(--ink);
        margin-bottom: 8px;
      }

      #reportRoot {
        display: none;
      }
      #reportRoot.show {
        display: block;
      }

      @media (max-width: 720px) {
        .loaded-row {
          grid-template-columns: 24px 1fr auto;
          gap: 8px;
        }
        .loaded-row .lr-meta {
          grid-column: 2;
        }
        .loaded-row .lr-date {
          grid-column: 2;
        }
        .mover-row {
          grid-template-columns: 32px 1fr auto;
        }
        .mover-row .m-scores {
          grid-column: 2;
          text-align: left;
        }
        .panel {
          padding: 20px;
        }
      }
    </style>
  </head>

  <body>
    <div class="shell">
      <header class="topbar">
        <a href="index.html" class="brand-mark" aria-label="AEO Suite home"
          ><span>aeo</span></a
        >
        <div class="brand-text">
          <div class="product">AEO Suite</div>
          <div class="suite">Trend Report · v1</div>
        </div>
        <div class="topbar-spacer"></div>
        <div class="status-pill">LIVE</div>
      </header>

      <section class="hero">
        <div class="eyebrow">Comparison Mode — Visibility Over Time</div>
        <h1>How is visibility <em>changing</em>?</h1>
        <p>
          Upload two or more visibility scan CSVs from different dates to see
          how your brand's visibility, mention rate, and per-platform
          performance have moved.
        </p>
      </section>

      <!-- Multi-CSV upload zone -->
      <section id="uploadSection">
        <label class="multi-upload" id="multiUpload">
          <input type="file" id="csvInput" accept=".csv,text/csv" multiple />
          <div class="mu-icon">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
          </div>
          <div class="mu-title">Drop multiple CSVs, or click to browse</div>
          <div class="mu-sub">
            Use 2 or more scan CSVs from different dates. We'll sort them by
            date and show how visibility changed over time.
          </div>
          <div class="mu-hint">
            CSV format must match the visibility scan output
          </div>
        </label>
      </section>

      <!-- Loaded files list -->
      <section id="loadedSection"></section>

      <!-- Report -->
      <section id="reportRoot"></section>
    </div>

    <script src="shared/state.js"></script>
    <script>
      // ============================================================
      // Trend Report — v1
      // ============================================================
      // Reads multiple scan CSVs (one per upload), aligns them by date,
      // and shows visibility-over-time line chart + biggest query movers.
      //
      // Each scan is the same data shape we use elsewhere: rows with
      // Date, Brand, Query, Platform, Visibility Score, Mentions, etc.
      // ============================================================

      const PLATFORM_OPTIONS = [
        { key: "gpt", label: "GPT" },
        { key: "perplexity", label: "Perplexity" },
        { key: "ai_mode", label: "AI Mode" },
      ];

      // state.scans is an array of:
      //   { id, filename, rows, fields, brand, queries, date, avgScore, mentionRate, platformScores }
      // Sorted by date ascending.
      const state = {
        scans: [],
        warnings: [],
      };

      const els = {
        upload: document.getElementById("multiUpload"),
        csvInput: document.getElementById("csvInput"),
        loadedSection: document.getElementById("loadedSection"),
        reportRoot: document.getElementById("reportRoot"),
      };

      // ============================================================
      // CSV parser — same as other tools, kept inline for parity
      // ============================================================
      function parseCsvToObjects(text) {
        const lines = [];
        let cur = "",
          inQ = false,
          row = [];
        for (let i = 0; i < text.length; i++) {
          const c = text[i];
          if (inQ) {
            if (c === '"' && text[i + 1] === '"') {
              cur += '"';
              i++;
            } else if (c === '"') inQ = false;
            else cur += c;
          } else {
            if (c === '"') inQ = true;
            else if (c === ",") {
              row.push(cur);
              cur = "";
            } else if (c === "\n" || c === "\r") {
              if (cur !== "" || row.length) {
                row.push(cur);
                lines.push(row);
                row = [];
                cur = "";
              }
              if (c === "\r" && text[i + 1] === "\n") i++;
            } else cur += c;
          }
        }
        if (cur !== "" || row.length) {
          row.push(cur);
          lines.push(row);
        }
        if (lines.length === 0) return [];
        const headers = lines[0];
        return lines.slice(1).map((arr) => {
          const obj = {};
          headers.forEach((h, i) => {
            obj[h] = arr[i] ?? "";
          });
          return obj;
        });
      }

      // ============================================================
      // Field resolver — same union-across-rows pattern used elsewhere.
      // A sparse first row can't hide field names from the resolver.
      // ============================================================
      function resolveFields(rowsOrSample) {
        const sources = Array.isArray(rowsOrSample)
          ? rowsOrSample
          : [rowsOrSample];
        const keySet = new Set();
        sources.forEach((row) => {
          if (row && typeof row === "object") {
            Object.keys(row).forEach((k) => keySet.add(k));
          }
        });
        const keys = Array.from(keySet);
        const norm = (k) =>
          String(k)
            .trim()
            .toLowerCase()
            .replace(/[\s_-]+/g, " ");
        const find = (...patterns) => {
          for (const k of keys) {
            const n = norm(k);
            for (const p of patterns) if (p.test(n)) return k;
          }
          return null;
        };
        return {
          date: find(/^date$/, /timestamp/),
          brand: find(/^brand$/, /brand name/, /^company$/),
          platform: find(/^platform$/, /channel/),
          query: find(/^query$/, /search query/, /^question$/),
          rawOutput: find(/raw output/, /model output/, /^response$/),
          score: find(/visibility score/, /visbility score/, /^score$/),
          mentions: keys
            .filter((k) => /mention/i.test(k))
            .sort((a, b) => {
              const an = parseInt((a.match(/\d+/) || [0])[0]);
              const bn = parseInt((b.match(/\d+/) || [0])[0]);
              return an - bn;
            }),
        };
      }

      function fieldVal(row, key, fb = "") {
        if (!key) return fb;
        const v = row[key];
        if (v === undefined || v === null) return fb;
        return typeof v === "string" ? v.trim() : v;
      }

      function normalizePlatform(v) {
        return String(v || "")
          .trim()
          .toLowerCase()
          .replace(/[\s-]+/g, "_");
      }

      function parseScore(v) {
        if (v === null || v === undefined || v === "") return null;
        const s = String(v).replace(/%/g, "").trim();
        if (s === "" || isNaN(s)) return null;
        return parseFloat(s);
      }

      function brandKey(name) {
        return String(name || "")
          .toLowerCase()
          .replace(/\b(inc|llc|ltd|corp|co|the|health|wellness|clinic)\b/g, "")
          .replace(/[^a-z0-9]+/g, "")
          .trim();
      }

      // Two-pass spacing-tolerant brand matcher — same as other tools.
      function brandMatcher(brandLower) {
        if (!brandLower) return null;
        const dense = brandLower.replace(/[^a-z0-9]+/gi, "").toLowerCase();
        if (!dense) return null;
        const tokens = brandLower.split(/[^a-z0-9]+/i).filter(Boolean);
        const escaped = tokens
          .map((t) => t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"))
          .join("\\s*");
        return {
          dense,
          tokenRe: new RegExp("\\b" + escaped + "\\b", "i"),
        };
      }
      function brandAppears(matcher, hay) {
        if (!matcher) return false;
        if (matcher.tokenRe.test(hay)) return true;
        const lowerHay = String(hay).toLowerCase();
        const denseChars = [],
          positions = [];
        for (let i = 0; i < lowerHay.length; i++) {
          const c = lowerHay[i];
          if ((c >= "a" && c <= "z") || (c >= "0" && c <= "9")) {
            denseChars.push(c);
            positions.push(i);
          }
        }
        const denseHay = denseChars.join("");
        const target = matcher.dense;
        let searchFrom = 0;
        while (true) {
          const idx = denseHay.indexOf(target, searchFrom);
          if (idx === -1) return false;
          const startInHay = positions[idx];
          const endInHay = positions[idx + target.length - 1] + 1;
          const charBefore = startInHay > 0 ? lowerHay[startInHay - 1] : "";
          const charAfter =
            endInHay < lowerHay.length ? lowerHay[endInHay] : "";
          const beforeIsWord = /[a-z0-9_]/.test(charBefore);
          const afterIsWord = /[a-z0-9_]/.test(charAfter);
          if (!beforeIsWord && !afterIsWord) return true;
          searchFrom = idx + 1;
        }
      }
      function rowMentionsBrand(row, fields, brandRe) {
        if (!brandRe) return false;
        const hay =
          fieldVal(row, fields.rawOutput) +
          " " +
          fields.mentions.map((k) => fieldVal(row, k)).join(" ");
        return brandAppears(brandRe, hay);
      }

      // ============================================================
      // Parse a single scan into the standard shape
      // ============================================================
      function parseScan(rows, filename) {
        if (!rows || rows.length === 0) {
          return { error: "CSV has no data rows", filename };
        }
        const fields = resolveFields(rows);
        if (!fields.brand || !fields.score) {
          return {
            error: "Missing required columns (Brand and/or Visibility Score)",
            filename,
          };
        }

        const brand = String(fieldVal(rows[0], fields.brand) || "").trim();
        if (!brand) return { error: "Brand field is empty in row 1", filename };

        // Pick the scan's date — use the date from the first row that has one.
        // If multiple dates exist within one CSV, that's a multi-day scan and
        // we use the earliest date as the canonical timestamp.
        let scanDate = null;
        if (fields.date) {
          const dates = rows
            .map((r) => String(fieldVal(r, fields.date) || "").trim())
            .filter(Boolean);
          if (dates.length > 0) {
            // Sort lexicographically — ISO format (YYYY-MM-DD) sorts correctly.
            const sortedDates = [...dates].sort();
            scanDate = sortedDates[0];
          }
        }
        // Fall back to filename heuristic — look for YYYY-MM-DD pattern in name
        if (!scanDate) {
          const m = filename.match(/(\d{4}-\d{2}-\d{2})/);
          if (m) scanDate = m[1];
        }
        if (!scanDate) {
          return {
            error: "No date field in CSV and no YYYY-MM-DD in filename",
            filename,
          };
        }

        // Compute scan-level metrics
        const brandRe = brandMatcher(brand.toLowerCase());
        let scoreSum = 0,
          scoreCount = 0;
        let mentionedRows = 0;
        const queries = new Set();
        // Per-platform: { gpt: [scores], perplexity: [scores], ai_mode: [scores] }
        const perPlatform = {};
        // Per-query best score across platforms (for movers calc)
        const perQuery = {};

        rows.forEach((row) => {
          const q = String(fieldVal(row, fields.query) || "").trim();
          if (q) queries.add(q);

          const score = parseScore(fieldVal(row, fields.score));
          if (score !== null) {
            scoreSum += score;
            scoreCount += 1;
          }

          if (rowMentionsBrand(row, fields, brandRe)) {
            mentionedRows += 1;
          }

          const platform = normalizePlatform(fieldVal(row, fields.platform));
          if (platform && score !== null) {
            if (!perPlatform[platform]) perPlatform[platform] = [];
            perPlatform[platform].push(score);
          }

          // Track per-query average score (across platforms for that query in this scan)
          if (q && score !== null) {
            if (!perQuery[q]) perQuery[q] = [];
            perQuery[q].push(score);
          }
        });

        const avgScore = scoreCount > 0 ? scoreSum / scoreCount : null;
        const mentionRate =
          rows.length > 0 ? (mentionedRows / rows.length) * 100 : null;
        const platformScores = {};
        Object.entries(perPlatform).forEach(([p, arr]) => {
          platformScores[p] =
            arr.length > 0 ? arr.reduce((s, x) => s + x, 0) / arr.length : null;
        });

        // Average per-query score (across platforms)
        const queryScores = {};
        Object.entries(perQuery).forEach(([q, arr]) => {
          queryScores[q] =
            arr.length > 0 ? arr.reduce((s, x) => s + x, 0) / arr.length : null;
        });

        return {
          id: "scan-" + Math.random().toString(36).slice(2, 9),
          filename,
          rows,
          fields,
          brand,
          queries: Array.from(queries),
          date: scanDate,
          avgScore,
          mentionRate,
          platformScores,
          queryScores,
          rowCount: rows.length,
        };
      }

      // ============================================================
      // Upload handling
      // ============================================================
      els.upload.addEventListener("dragover", (e) => {
        e.preventDefault();
        els.upload.classList.add("is-dragover");
      });
      els.upload.addEventListener("dragleave", () =>
        els.upload.classList.remove("is-dragover"),
      );
      els.upload.addEventListener("drop", (e) => {
        e.preventDefault();
        els.upload.classList.remove("is-dragover");
        const files = Array.from(e.dataTransfer.files).filter((f) =>
          /\.csv$/i.test(f.name),
        );
        if (files.length > 0) ingestFiles(files);
      });
      els.csvInput.addEventListener("change", (e) => {
        const files = Array.from(e.target.files);
        if (files.length > 0) ingestFiles(files);
        // Reset the input so the same file can be re-added if removed
        e.target.value = "";
      });

      function ingestFiles(files) {
        let remaining = files.length;
        files.forEach((file) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const rows = parseCsvToObjects(e.target.result);
              const scan = parseScan(rows, file.name);
              if (scan.error) {
                state.warnings.push({ filename: file.name, error: scan.error });
              } else {
                state.scans.push(scan);
              }
            } catch (err) {
              state.warnings.push({
                filename: file.name,
                error: "Parse error: " + err.message,
              });
            }
            remaining -= 1;
            if (remaining === 0) finalizeIngest();
          };
          reader.readAsText(file);
        });
      }

      function finalizeIngest() {
        // Sort scans by date ascending
        state.scans.sort((a, b) => a.date.localeCompare(b.date));

        // Validate consistency: same brand, distinct dates
        const cross = validateScans();

        renderLoadedPanel(cross);
        if (state.scans.length >= 2 && cross.canRender) {
          render();
        } else {
          els.reportRoot.classList.remove("show");
          els.reportRoot.innerHTML = "";
        }
      }

      function validateScans() {
        const warnings = [];
        let canRender = true;

        if (state.scans.length === 0) {
          return { warnings, canRender: false };
        }

        // Check all scans are the same brand (by brandKey)
        const brandKeys = new Set(state.scans.map((s) => brandKey(s.brand)));
        if (brandKeys.size > 1) {
          const list = state.scans.map((s) => `"${s.brand}"`).join(", ");
          warnings.push(
            `Mixed brands detected: ${list}. All scans must be for the same brand.`,
          );
          canRender = false;
        }

        // Check for duplicate dates
        const dateMap = {};
        state.scans.forEach((s) => {
          if (!dateMap[s.date]) dateMap[s.date] = [];
          dateMap[s.date].push(s);
        });
        const dupes = Object.entries(dateMap).filter(
          ([, arr]) => arr.length > 1,
        );
        if (dupes.length > 0) {
          const dupList = dupes
            .map(([d, arr]) => `${d} (${arr.length} scans)`)
            .join(", ");
          warnings.push(
            `Duplicate dates: ${dupList}. Each scan needs a unique date for trend analysis.`,
          );
          canRender = false;
        }

        if (state.scans.length < 2 && state.warnings.length === 0) {
          warnings.push("Upload at least one more scan to see a trend.");
          canRender = false;
        }

        return { warnings, canRender };
      }

      function renderLoadedPanel(validation) {
        if (state.scans.length === 0 && state.warnings.length === 0) {
          els.loadedSection.innerHTML = "";
          return;
        }

        const rows = state.scans
          .map(
            (s, i) => `
      <div class="loaded-row" data-id="${s.id}">
        <div class="lr-idx">${String(i + 1).padStart(2, "0")}</div>
        <div>
          <div class="lr-file">${escapeHtml(s.filename)}</div>
          <div class="lr-meta">${escapeHtml(s.brand)} · ${s.rowCount} rows · ${s.queries.length} ${s.queries.length === 1 ? "query" : "queries"} · avg ${s.avgScore !== null ? Math.round(s.avgScore) + "%" : "—"}</div>
        </div>
        <div class="lr-meta">&nbsp;</div>
        <div class="lr-date">${escapeHtml(s.date)}</div>
        <button class="lr-remove" data-remove="${s.id}" title="Remove this scan">×</button>
      </div>
    `,
          )
          .join("");

        // Files that failed to parse
        const errorRows = state.warnings
          .map(
            (w) => `
      <div class="loaded-row bad">
        <div class="lr-idx">!</div>
        <div>
          <div class="lr-file">${escapeHtml(w.filename)}</div>
          <div class="lr-meta" style="color: var(--bad);">${escapeHtml(w.error)}</div>
        </div>
        <div class="lr-meta">&nbsp;</div>
        <div class="lr-date" style="color: var(--bad);">Skipped</div>
        <button class="lr-remove" data-clear-warning="${escapeHtml(w.filename)}" title="Dismiss">×</button>
      </div>
    `,
          )
          .join("");

        const validationWarnings =
          validation.warnings.length > 0
            ? `<div class="loaded-warnings"><strong>Cannot render trend:</strong> ${validation.warnings.map(escapeHtml).join("<br/>")}</div>`
            : "";

        els.loadedSection.innerHTML = `
      <div class="loaded-panel">
        <div class="loaded-head">
          <div class="loaded-title">Loaded ${state.scans.length} ${state.scans.length === 1 ? "scan" : "scans"}${state.warnings.length > 0 ? ` · ${state.warnings.length} failed` : ""}</div>
          <div class="loaded-actions">
            <button id="addMoreBtn" type="button">+ Add more CSVs</button>
            <button id="clearAllBtn" type="button">Clear all</button>
          </div>
        </div>
        <div class="loaded-list">
          ${rows}
          ${errorRows}
        </div>
        ${validationWarnings}
      </div>
    `;

        // Wire handlers
        document.querySelectorAll("[data-remove]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const id = btn.getAttribute("data-remove");
            state.scans = state.scans.filter((s) => s.id !== id);
            finalizeIngest();
          });
        });
        document.querySelectorAll("[data-clear-warning]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const fn = btn.getAttribute("data-clear-warning");
            state.warnings = state.warnings.filter((w) => w.filename !== fn);
            finalizeIngest();
          });
        });
        document.getElementById("addMoreBtn").addEventListener("click", () => {
          els.csvInput.click();
        });
        document.getElementById("clearAllBtn").addEventListener("click", () => {
          state.scans = [];
          state.warnings = [];
          els.loadedSection.innerHTML = "";
          els.reportRoot.classList.remove("show");
          els.reportRoot.innerHTML = "";
        });
      }

      // ============================================================
      // RENDER
      // ============================================================
      function render() {
        const scans = state.scans;
        const first = scans[0];
        const last = scans[scans.length - 1];

        // Use the union of brand names but the brandKey-normalized form for matching
        const brandLabel = first.brand;

        // ---------- Headline delta ----------
        const firstScore = first.avgScore ?? 0;
        const lastScore = last.avgScore ?? 0;
        const delta = lastScore - firstScore;
        const deltaDirection =
          delta > 0.5 ? "up" : delta < -0.5 ? "down" : "flat";
        const deltaSign = delta > 0 ? "+" : "";

        let html = `
      <div class="tr-headline">
        <div class="label">Visibility Trend · ${escapeHtml(brandLabel)}</div>
        <div class="delta-block">
          <div class="delta-val">${Math.round(firstScore)}%</div>
          <div class="delta-arrow">→</div>
          <div class="delta-val ${deltaDirection}">${Math.round(lastScore)}%</div>
        </div>
        <div class="delta-sub" style="margin-bottom: 8px;">
          <span class="delta-val ${deltaDirection}" style="font-size: 18px;">${deltaSign}${Math.round(delta * 10) / 10}pts</span>
          across ${scans.length} ${scans.length === 1 ? "scan" : "scans"}
        </div>
        <div class="span-meta">${escapeHtml(first.date)} → ${escapeHtml(last.date)}</div>
      </div>
    `;

        // ---------- Visibility-over-time line chart ----------
        html += renderVisibilityChart(scans);

        // ---------- Mention rate over time ----------
        html += renderMentionRateChart(scans);

        // ---------- Biggest movers ----------
        html += renderMovers(scans);

        els.reportRoot.innerHTML = html;
        els.reportRoot.classList.add("show");

        wireChartHovers();
      }

      // ============================================================
      // Visibility chart — overall + per-platform lines
      // ============================================================
      function renderVisibilityChart(scans) {
        // Build series. "you" = overall avgScore. Then per-platform.
        const series = [
          {
            key: "you",
            label: "Overall",
            data: scans.map((s) => ({ date: s.date, value: s.avgScore })),
          },
        ];
        PLATFORM_OPTIONS.forEach((p) => {
          const data = scans.map((s) => ({
            date: s.date,
            value: s.platformScores[p.key],
          }));
          // Only include platform if it has data in at least one scan
          if (data.some((d) => d.value !== null && d.value !== undefined)) {
            series.push({ key: p.key, label: p.label, data });
          }
        });

        const chartSvg = buildLineChart(
          series,
          scans.map((s) => s.date),
          0,
          100,
        );

        return `
      <div class="panel" id="visibilityChart">
        <div class="panel-label">Visibility Score Over Time</div>
        <div class="chart-wrap" data-chart-type="visibility">
          ${chartSvg}
          <div class="chart-tooltip"></div>
        </div>
        <div class="chart-legend">
          ${series.map((s) => `<span class="lg-item"><span class="swatch ${s.key}"></span>${escapeHtml(s.label)}</span>`).join("")}
        </div>
      </div>
    `;
      }

      function renderMentionRateChart(scans) {
        const data = scans.map((s) => ({ date: s.date, value: s.mentionRate }));
        const series = [{ key: "you", label: "Mention rate", data }];
        const chartSvg = buildLineChart(
          series,
          scans.map((s) => s.date),
          0,
          100,
        );

        const first = data[0].value || 0;
        const last = data[data.length - 1].value || 0;
        const delta = last - first;
        const deltaSign = delta > 0 ? "+" : "";

        return `
      <div class="panel" id="mentionRateChart">
        <div class="panel-label">Mention Rate Over Time</div>
        <div style="font-size: 13px; color: var(--ink-mute); margin-bottom: 14px;">
          What share of AI responses named your brand. <strong style="color: ${delta > 0 ? "var(--ok)" : delta < 0 ? "var(--bad)" : "var(--ink-mute)"};">${deltaSign}${Math.round(delta * 10) / 10}pts</strong> over the span.
        </div>
        <div class="chart-wrap" data-chart-type="mentionRate">
          ${chartSvg}
          <div class="chart-tooltip"></div>
        </div>
      </div>
    `;
      }

      // ============================================================
      // SVG line chart builder
      // ============================================================
      // viewBox 0..1000 wide, 0..280 tall. Padding for axis labels.
      function buildLineChart(series, dateLabels, yMin, yMax) {
        const PAD_LEFT = 36,
          PAD_RIGHT = 12,
          PAD_TOP = 12,
          PAD_BOTTOM = 28;
        const W = 1000,
          H = 280;
        const innerW = W - PAD_LEFT - PAD_RIGHT;
        const innerH = H - PAD_TOP - PAD_BOTTOM;
        const n = dateLabels.length;

        // X positions for each scan
        const xPos = (i) =>
          PAD_LEFT + (n === 1 ? innerW / 2 : (i / (n - 1)) * innerW);
        // Y position from value
        const yPos = (v) => {
          if (v === null || v === undefined || isNaN(v)) return null;
          const clamped = Math.max(yMin, Math.min(yMax, v));
          return PAD_TOP + innerH - ((clamped - yMin) / (yMax - yMin)) * innerH;
        };

        // Gridlines at 0/25/50/75/100
        const yTicks = [0, 25, 50, 75, 100];
        const gridLines = yTicks
          .map((t) => {
            const y = yPos(t);
            return `<line x1="${PAD_LEFT}" y1="${y}" x2="${W - PAD_RIGHT}" y2="${y}"/>`;
          })
          .join("");
        const yLabels = yTicks
          .map((t) => {
            const y = yPos(t);
            return `<text x="${PAD_LEFT - 6}" y="${y + 3}" text-anchor="end">${t}%</text>`;
          })
          .join("");

        // X-axis date labels — show first, last, and middle ones (avoid crowding)
        const xLabels = dateLabels
          .map((d, i) => {
            // Always show first and last; show middle ones if few enough
            const showAll = n <= 6;
            const showThis =
              i === 0 ||
              i === n - 1 ||
              showAll ||
              (n > 6 && i % Math.ceil(n / 5) === 0);
            if (!showThis) return "";
            const x = xPos(i);
            // Anchor: start for first, end for last, middle otherwise
            const anchor = i === 0 ? "start" : i === n - 1 ? "end" : "middle";
            return `<text x="${x}" y="${H - 8}" text-anchor="${anchor}">${escapeHtml(d)}</text>`;
          })
          .join("");

        // Lines + dots for each series
        const seriesMarkup = series
          .map((s) => {
            const points = s.data.map((d, i) => {
              const y = yPos(d.value);
              if (y === null) return null;
              return { x: xPos(i), y, value: d.value, date: d.date };
            });
            // Build path that breaks on nulls
            let path = "";
            let started = false;
            points.forEach((p) => {
              if (p === null) {
                started = false;
                return;
              }
              path +=
                (started ? " L " : "M ") +
                p.x.toFixed(1) +
                " " +
                p.y.toFixed(1);
              started = true;
            });
            const dots = points
              .map((p) =>
                p === null
                  ? ""
                  : `<circle class="dot ${s.key}" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" data-series="${s.key}" data-label="${escapeHtml(s.label)}" data-date="${escapeHtml(p.date)}" data-value="${Math.round(p.value * 10) / 10}"/>`,
              )
              .join("");
            return `<path class="line ${s.key}" d="${path}"/>${dots}`;
          })
          .join("");

        return `
      <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <g class="grid">${gridLines}</g>
        <g class="axis">${yLabels}${xLabels}</g>
        <line class="axis-line" x1="${PAD_LEFT}" y1="${PAD_TOP + innerH}" x2="${W - PAD_RIGHT}" y2="${PAD_TOP + innerH}"/>
        ${seriesMarkup}
      </svg>
    `;
      }

      function wireChartHovers() {
        document.querySelectorAll(".chart-wrap").forEach((wrap) => {
          const tip = wrap.querySelector(".chart-tooltip");
          const dots = wrap.querySelectorAll(".dot");
          dots.forEach((dot) => {
            dot.addEventListener("mouseenter", (e) => {
              const series = dot.getAttribute("data-series");
              const label = dot.getAttribute("data-label");
              const date = dot.getAttribute("data-date");
              const value = dot.getAttribute("data-value");
              tip.innerHTML = `
            <div class="tt-date">${escapeHtml(date)}</div>
            <div class="tt-row"><span class="sw" style="background: ${seriesColor(series)};"></span>${escapeHtml(label)} <strong>${value}%</strong></div>
          `;
              // Position tooltip near the dot
              const rect = dot.getBoundingClientRect();
              const wrapRect = wrap.getBoundingClientRect();
              tip.style.left =
                rect.left - wrapRect.left + rect.width / 2 + "px";
              tip.style.top = rect.top - wrapRect.top - 8 + "px";
              tip.style.transform = "translate(-50%, -100%)";
              tip.classList.add("show");
            });
            dot.addEventListener("mouseleave", () => {
              tip.classList.remove("show");
            });
          });
        });
      }

      function seriesColor(key) {
        return (
          {
            you: "var(--accent)",
            gpt: "#9ec5e8",
            perplexity: "#c8a878",
            ai_mode: "#b39de0",
          }[key] || "var(--ink-mute)"
        );
      }

      // ============================================================
      // Biggest movers — queries with the biggest first→last delta
      // ============================================================
      function renderMovers(scans) {
        const first = scans[0];
        const last = scans[scans.length - 1];

        // Build set of queries common to both first and last
        const commonQueries = first.queries.filter((q) =>
          last.queries.includes(q),
        );

        if (commonQueries.length === 0) {
          return `
        <div class="panel">
          <div class="panel-label">Biggest Movers</div>
          <div class="empty-state" style="margin: 0;">
            <div class="ico">∅</div>
            <h3>No common queries</h3>
            <p>The first and last scans don't share any queries, so per-query movement can't be calculated.</p>
          </div>
        </div>
      `;
        }

        // Compute deltas
        const moves = commonQueries.map((q) => {
          const firstScore = first.queryScores[q] ?? 0;
          const lastScore = last.queryScores[q] ?? 0;
          return {
            query: q,
            firstScore,
            lastScore,
            delta: lastScore - firstScore,
          };
        });

        // Take top movers by absolute delta, then sort by signed delta (gains first)
        moves.sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta));
        const topMoves = moves.slice(0, 10);
        topMoves.sort((a, b) => b.delta - a.delta);

        const rows = topMoves
          .map((m, i) => {
            const dir = m.delta > 0.5 ? "up" : m.delta < -0.5 ? "down" : "flat";
            const sign = m.delta > 0 ? "+" : "";
            return `
        <div class="mover-row ${dir}">
          <div class="m-rank">${String(i + 1).padStart(2, "0")}</div>
          <div class="m-query">"${escapeHtml(m.query)}"</div>
          <div class="m-scores">
            <span class="from">${Math.round(m.firstScore)}%</span>
            <span class="arrow">→</span>
            ${Math.round(m.lastScore)}%
          </div>
          <div class="m-delta">${sign}${Math.round(m.delta * 10) / 10}</div>
        </div>
      `;
          })
          .join("");

        const newOrDropped =
          first.queries.length + last.queries.length - commonQueries.length * 2;
        const noteBits = [];
        if (newOrDropped > 0) {
          noteBits.push(
            `${newOrDropped} ${newOrDropped === 1 ? "query" : "queries"} appeared in only one of the two endpoint scans (not shown — needs both to compute movement)`,
          );
        }

        return `
      <div class="panel">
        <div class="panel-label">Biggest Movers · ${commonQueries.length} ${commonQueries.length === 1 ? "query" : "queries"} compared</div>
        <div style="font-size: 13px; color: var(--ink-mute); margin-bottom: 14px;">
          Queries with the largest visibility-score change from <strong style="color: var(--ink);">${escapeHtml(first.date)}</strong> to <strong style="color: var(--ink);">${escapeHtml(last.date)}</strong>. ${noteBits.join(". ")}${noteBits.length > 0 ? "." : ""}
        </div>
        <div class="movers-list">${rows}</div>
      </div>
    `;
      }

      // ============================================================
      // Helpers
      // ============================================================
      function escapeHtml(s) {
        return String(s ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }
    </script>
  </body>
</html>
